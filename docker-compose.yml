services:
  lightpanda:
    image: lightpanda/browser:latest
    container_name: lightpanda
    ports:
      - "9222:9222"

  chrome:
    image: zenika/alpine-chrome
    container_name: chrome
    shm_size: "1gb"
    command:
      - --no-sandbox
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
    ports:
      - "9223:9222"